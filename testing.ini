###
# app configuration
# https://docs.pylonsproject.org/projects/pyramid/en/latest/narr/environment.html
###

[app:main]
use = egg:menage2

pyramid.reload_templates = false
pyramid.debug_authorization = false
pyramid.debug_notfound = false
pyramid.debug_routematch = false
pyramid.default_locale_name = de

sqlalchemy.url = postgresql:///menage-testing

menage.timezone = Europe/Berlin
menage.attachments_dir = var/test/attachments

retry.attempts = 3

# Sessions (in-memory for tests; no Redis needed)
session.type = memory
session.key = menage_session
session.secret = testing-secret
session.timeout = 259200
session.cookie_expires = true
session.httponly = true
session.secure = false
session.samesite = Lax

# SMTP — points at mailpit (started by devenv)
mail.host = localhost
mail.port = 1025
mail.username =
mail.password =
mail.from_address = test@localhost
mail.use_tls = false

[pshell]
setup = menage2.pshell.setup

[alembic]
# path to migration scripts
script_location = src/menage2/alembic
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s
# file_template = %%(rev)s_%%(slug)s

###
# logging configuration
# https://docs.pylonsproject.org/projects/pyramid/en/latest/narr/logging.html
###

[loggers]
keys = root, menage2, sqlalchemy, alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console

[logger_menage2]
level = DEBUG
handlers =
qualname = menage2

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine
# "level = INFO" logs SQL queries.
# "level = DEBUG" logs SQL queries and results.
# "level = WARN" logs neither.  (Recommended for production systems.)

[logger_alembic]
level = WARN
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s %(levelname)-5.5s [%(name)s:%(lineno)s][%(threadName)s] %(message)s
