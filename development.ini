###
# app configuration
# https://docs.pylonsproject.org/projects/pyramid/en/latest/narr/environment.html
###

[app:main]
use = egg:menage2

pyramid.reload_templates = true
pyramid.debug_authorization = false
pyramid.debug_notfound = false
pyramid.debug_routematch = false
pyramid.default_locale_name = de
pyramid.includes =
    pyramid_debugtoolbar

sqlalchemy.url = postgresql:///menage

menage.timezone = Europe/Berlin
menage.base_url = http://localhost:6543

retry.attempts = 3

# Sessions (beaker + Redis)
session.type = ext:redis
session.url = redis://localhost:6379/0
session.key = menage_session
session.secret = dev-secret-change-in-production-please
session.timeout = 259200
session.cookie_expires = true
# httponly: blocks JS access to the cookie — keep true everywhere (XSS protection)
session.httponly = true
# secure: false required for plain HTTP in development — production: must be true (HTTPS only)
session.secure = false
# samesite: Lax blocks cross-site POST forgery while allowing OAuth/email link redirects
session.samesite = Lax

# SMTP for password recovery
mail.host = localhost
mail.port = 1025
mail.username =
mail.password =
mail.from_address = menage@localhost
mail.use_tls = false

# By default, the toolbar only appears for clients from IP addresses
# '127.0.0.1' and '::1'.
# debugtoolbar.hosts = 127.0.0.1 ::1

[pshell]
setup = menage2.pshell.setup

###
# wsgi server configuration
###

[alembic]
# path to migration scripts
script_location = src/menage2/alembic
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s
# file_template = %%(rev)s_%%(slug)s

[server:main]
use = egg:waitress#main
listen = 0.0.0.0:6543

###
# logging configuration
# https://docs.pylonsproject.org/projects/pyramid/en/latest/narr/logging.html
###

[loggers]
keys = root, menage2, sqlalchemy, alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console

[logger_menage2]
level = DEBUG
handlers =
qualname = menage2

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine
# "level = INFO" logs SQL queries.
# "level = DEBUG" logs SQL queries and results.
# "level = WARN" logs neither.  (Recommended for production systems.)

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s %(levelname)-5.5s [%(name)s:%(lineno)s][%(threadName)s] %(message)s
