<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <clipPath id="p">
      <circle cx="32" cy="32" r="26"/>
    </clipPath>
  </defs>
  <!-- Mars: sandy rust base -->
  <circle cx="32" cy="32" r="26" fill="#DDA582"/>

  <!-- Northern lowlands (Vastitas Borealis) — wavy irregular blob -->
  <path d="M 6 18 C 10 10,20 8,26 13 C 30 16,32 11,38 14
           C 42 16,44 21,42 26 C 38 29,28 27,22 29
           C 14 31,4 28,6 18 Z"
        fill="#C09086" clip-path="url(#p)"/>

  <!-- Tharsis plateau — irregular elevated highland (lighter) -->
  <path d="M 7 20 C 9 15,16 13,21 18 C 24 22,23 29,18 33
           C 13 37,5 35,4 29 C 3 24,5 23,7 20 Z"
        fill="#E8B890" clip-path="url(#p)"/>

  <!-- Southern cratered highlands (Terra Cimmeria / Sirenum) -->
  <path d="M 5 43 C 8 36,16 34,22 38 C 27 41,28 37,33 41
           C 36 44,32 53,24 56 C 14 58,5 55,4 50
           C 2 46,3 47,5 43 Z"
        fill="#C4907E" clip-path="url(#p)"/>

  <!-- Hellas basin — outer rim depression -->
  <path d="M 14 39 C 16 34,26 33,32 38 C 35 42,34 49,28 52
           C 21 55,13 53,10 48 C 8 44,11 42,14 39 Z"
        fill="#C09086" clip-path="url(#p)"/>

  <!-- Hellas basin — deep floor -->
  <path d="M 19 41 C 22 37,30 38,33 43 C 34 47,31 51,26 52
           C 20 53,16 50,15 46 C 14 43,17 43,19 41 Z"
        fill="#6A3C34" clip-path="url(#p)"/>

  <!-- Argyre basin — outer rim -->
  <path d="M 7 47 C 9 42,16 41,21 45 C 24 48,23 55,18 57
           C 12 59,6 57,5 53 C 4 49,5 50,7 47 Z"
        fill="#B8827A" clip-path="url(#p)"/>

  <!-- Argyre basin — dark floor -->
  <path d="M 11 48 C 13 45,18 45,20 49 C 22 52,19 56,15 56
           C 11 56,9 53,11 48 Z"
        fill="#6A3C34" clip-path="url(#p)"/>

  <!-- Valles Marineris — canyon walls (wide outer fill) -->
  <path d="M 4 36 C 8 32,16 32,21 35 C 26 38,30 34,35 37
           C 37 38,38 41,35 42 C 29 43,22 40,17 39
           C 11 37,5 38,4 36 Z"
        fill="#B07060" clip-path="url(#p)"/>

  <!-- Valles Marineris — rift floor (dark inner groove) -->
  <path d="M 6 36 C 10 33,17 33,22 36 C 27 39,31 35,34 38
           C 35 39,35 41,33 41 C 27 41,21 39,16 38
           C 11 37,7 37,6 36 Z"
        fill="#8A5040" clip-path="url(#p)"/>

  <!-- Branch canyon NW — tapered arm curving up from main rift -->
  <path d="M 15 33 C 12 29,8 25,10 20 C 11 18,13 18,14 20
           C 15 23,14 28,14 33 Z"
        fill="#A06858" clip-path="url(#p)"/>

  <!-- Branch canyon SW — curving arm down -->
  <path d="M 14 39 C 11 42,9 47,11 50 C 12 51,14 51,14 49
           C 14 46,13 42,14 39 Z"
        fill="#A06858" clip-path="url(#p)"/>

  <!-- Sinuous valley / dried channel — stroked curve for variety -->
  <path d="M 6 24 C 9 22,12 25,14 29 C 16 33,14 36,17 39"
        fill="none" stroke="#9A6050" stroke-width="1.2" stroke-linecap="round"
        clip-path="url(#p)"/>

  <!-- Impact crater — irregular rim -->
  <path d="M 13 19 C 14 16,20 15,22 18 C 24 21,23 26,20 27
           C 16 28,12 26,12 22 C 12 19,12.5 20,13 19 Z"
        fill="#B28272" clip-path="url(#p)"/>

  <!-- Crater — dark floor -->
  <path d="M 16 20 C 17.5 17.5,21 18,22 21 C 23 23,21 26,18 26
           C 15 26,14.5 23,15.5 21 C 15.5 20,15.5 20.5,16 20 Z"
        fill="#8A5848" clip-path="url(#p)"/>

  <!-- Left-limb terrain texture blob -->
  <path d="M 5 29 C 8 26,13 26,14 31 C 15 35,12 39,8 39
           C 4 38,3 34,5 29 Z"
        fill="#C09086" clip-path="url(#p)"/>

  <!-- Shadow terminator: crisp crescent on right side -->
  <circle cx="50" cy="34" r="26" fill="#432A21" clip-path="url(#p)"/>
  <!-- Crisp limb -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#14080A" stroke-width="1.5"/>
</svg>
